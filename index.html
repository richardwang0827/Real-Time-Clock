<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="AuroraClock — a polished real-time clock with multi-language support, localized theme names, 12/24-hour toggle (left=24h, right=12h), and timezone/DST change detection." />
  <meta name="theme-color" content="#2563eb" />
  <title>AuroraClock</title>
  <style>
    :root{--fg:#0f172a;--muted:#475569;--accent:#2563eb;--bg-a:#f6f7fb;--bg-b:#ffffff;--bg-c:#eef2ff;--panel:rgba(255,255,255,.72);--panel-strong:rgba(255,255,255,.88);--panel-border:rgba(15,23,42,.10);--menu-bg:#ffffff;--menu-fg:#0f172a;--menu-border:rgba(15,23,42,.18);--shadow:0 22px 70px rgba(2,6,23,.12);--shadow2:0 14px 40px rgba(2,6,23,.10);--ring:0 0 0 3px rgba(37,99,235,.25);--top-gap:calc(14px + env(safe-area-inset-top));--bar-width:min(1100px, calc(100vw - 28px));--topbar-h:0px;color-scheme:light}
    html[data-scheme="dark"]{color-scheme:dark}
    html[data-scheme="light"]{color-scheme:light}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--fg);min-height:100svh;overflow-x:hidden;background:radial-gradient(1200px 800px at 18% 16%,color-mix(in oklab,var(--accent),transparent 80%),transparent 58%),radial-gradient(900px 600px at 84% 82%,color-mix(in oklab,var(--accent),transparent 88%),transparent 62%),linear-gradient(135deg,var(--bg-a),var(--bg-b),var(--bg-c));transition:background 220ms ease,color 220ms ease}
    @supports not (background: color-mix(in oklab, white, black)){body{background:linear-gradient(135deg,var(--bg-a),var(--bg-b),var(--bg-c))}}
    .topbar{position:fixed;top:var(--top-gap);left:50%;transform:translateX(-50%);width:var(--bar-width);z-index:10;background:var(--panel-strong);border:1px solid var(--panel-border);border-radius:16px;box-shadow:var(--shadow2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .stage{min-height:100svh;display:grid;place-items:center;padding-top:calc(var(--top-gap) + var(--topbar-h) + 18px);padding-bottom:calc(18px + env(safe-area-inset-bottom));padding-left:14px;padding-right:14px}
    .brand{display:flex;align-items:center;gap:10px;min-width:260px}
    .dot{width:10px;height:10px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 6px color-mix(in oklab,var(--accent),transparent 80%);flex:0 0 auto}
    .title{font-weight:750;letter-spacing:.01em;font-size:13px;color:var(--muted);user-select:none;white-space:nowrap}
    .sub{font-size:12px;color:var(--muted);opacity:.92;user-select:none;white-space:nowrap}
    .controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:10px}
    button,.toggle,select{font:inherit;color:var(--fg);background:transparent;border:1px solid var(--panel-border);border-radius:12px;padding:10px 12px;cursor:pointer;transition:transform 60ms ease,background 160ms ease,border-color 160ms ease;user-select:none;line-height:1}
    button:hover,.toggle:hover,select:hover{background:color-mix(in oklab,var(--fg),transparent 94%)}
    button:active,.toggle:active{transform:scale(.98)}
    button:focus-visible,.toggle:focus-within,select:focus-visible{outline:none;box-shadow:var(--ring)}
    .btn-accent{border-color:color-mix(in oklab,var(--accent),transparent 55%);background:color-mix(in oklab,var(--accent),transparent 90%)}
    .btn-accent:hover{background:color-mix(in oklab,var(--accent),transparent 84%)}
    .selectWrap{position:relative;display:inline-block}
    .selectWrap::after{content:"";position:absolute;right:14px;top:50%;transform:translateY(-30%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid var(--menu-fg);pointer-events:none;opacity:.9}
    select{padding-right:44px;appearance:none;-webkit-appearance:none;-moz-appearance:none;background-color:var(--menu-bg);color:var(--menu-fg);border-color:var(--menu-border)}
    select option{background-color:var(--menu-bg);color:var(--menu-fg)}
    select option:checked{background-color:color-mix(in oklab,var(--accent),var(--menu-bg) 70%);color:var(--menu-fg)}
    .toggle{display:flex;align-items:center;gap:10px;padding:10px 12px}
    .switch{width:44px;height:24px;border-radius:999px;background:color-mix(in oklab,var(--muted),transparent 70%);position:relative;flex:0 0 auto;transition:background 160ms ease}
    .switch::after{content:"";position:absolute;width:18px;height:18px;top:3px;left:3px;background:color-mix(in oklab,white,var(--bg-b) 20%);border-radius:999px;box-shadow:0 1px 2px rgba(0,0,0,.25);transform:translateX(0);transition:transform 160ms ease}
    .toggle input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}
    .toggle[data-on="true"] .switch{background:color-mix(in oklab,var(--accent),var(--panel) 70%)}
    .toggle[data-on="true"] .switch::after{transform:translateX(20px)}
    .clock{width:min(1040px,94vw);padding:clamp(34px,5.8vw,62px);border-radius:32px;background:var(--panel);border:1px solid var(--panel-border);box-shadow:var(--shadow);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);text-align:center}
    .time{display:flex;justify-content:center;align-items:baseline;gap:clamp(10px,2vw,18px);flex-wrap:nowrap;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-variant-numeric:tabular-nums;font-weight:950;letter-spacing:.06em;line-height:1.01;margin:4px 0 0;white-space:nowrap}
    #timeDigits{font-size:clamp(4.6rem,18vw,9.2rem)}
    .ampm{font-size:clamp(1.6rem,4.8vw,3.2rem);letter-spacing:.04em;opacity:.95}
    .date{margin-top:18px;font-size:clamp(1.15rem,3.4vw,1.5rem);color:var(--muted)}
    .meta{margin-top:16px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px;user-select:none}
    .pill{border:1px solid var(--panel-border);background:color-mix(in oklab,var(--panel),var(--fg) 3%);border-radius:999px;padding:7px 10px;display:flex;align-items:center;gap:6px}
    .toast{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--panel-strong);border:1px solid var(--panel-border);box-shadow:var(--shadow2);border-radius:999px;padding:10px 14px;font-size:13px;color:var(--fg);opacity:0;pointer-events:none;transition:opacity 180ms ease,transform 180ms ease}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
    @media (max-width:760px){.brand{display:none}.topbar{justify-content:center}}
    @media (max-width:440px){.clock{width:94vw}.time{letter-spacing:.03em}.selectWrap::after{right:12px;border-left-width:5px;border-right-width:5px;border-top-width:6px}}
    @media (prefers-reduced-motion: reduce){body,.clock,.topbar,button,.toggle,select,.switch,.switch::after,.toast{transition:none!important}}
  </style>
</head>
<body>
  <div class="topbar" id="topbar" role="navigation" aria-label="Clock controls">
    <div class="brand" aria-hidden="true">
      <span class="dot"></span>
      <div>
        <div class="title" id="brandTitle">AuroraClock</div>
        <div class="sub" id="tzLabel">Detecting timezone…</div>
      </div>
    </div>
    <div class="controls">
      <label for="langSelect" class="title" id="langLabel" style="margin-right:-4px;">Language</label>
      <span class="selectWrap">
        <select id="langSelect" aria-label="Select language"></select>
      </span>
      <label for="themeSelect" class="title" id="themeLabel" style="margin-right:-4px;">Theme</label>
      <span class="selectWrap">
        <select id="themeSelect" aria-label="Select theme"></select>
      </span>
      <div class="toggle" id="fmtToggle" role="switch" aria-checked="false" tabindex="0" data-on="false">
        <span class="switch" aria-hidden="true"></span>
        <span id="fmtLabel"><strong>24‑hour</strong></span>
        <input id="fmtInput" type="checkbox" aria-label="Toggle 12/24-hour format" />
      </div>
      <button id="copyBtn" type="button" title="Copy time to clipboard" class="btn-accent">📋 Copy</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <main class="clock" role="group" aria-label="Clock widget">
      <div class="time" id="time" aria-live="polite" aria-atomic="true">
        <span id="timeDigits">--:--:--</span>
        <span id="timeAmPm" class="ampm" aria-hidden="true"></span>
      </div>
      <div class="date" id="date">Loading…</div>
      <div class="meta" aria-label="Timezone info">
        <div class="pill" title="IANA timezone name"><span>🗺️</span><span id="tzName">—</span></div>
        <div class="pill" title="UTC offset"><span>🕓</span><span id="utcOffset">UTC—</span></div>
        <div class="pill" title="Theme mode"><span>🎨</span><span id="themeMode">Auto</span></div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true">Updated</div>

    };

    function getSavedLocale(){ var v = storage.get("locale","auto"); return v || "auto"; }
    function effectiveLocale(){ var saved = getSavedLocale(); return (saved==="auto")?undefined:saved; }
    function isRTL(loc){ for (var i=0;i<LANGS.length;i++){ if (LANGS[i].id===loc) return LANGS[i].dir==="rtl"; } return false; }
    function activePack(){ var loc = effectiveLocale() || navigator.language || "en-US"; return I18N[loc] || I18N[(loc||"").split("-")[0]] || I18N["en-US"]; }
    function tStr(key){ var p = activePack(); return p[key] || I18N["en-US"][key] || key; }
    function tThemeName(id){ var p = activePack(); var dict = p.themes || (I18N["en-US"].themes); return (dict && dict[id]) || (I18N["en-US"].themes[id]||id); }

    function applyLanguageAttrs(){ var saved = getSavedLocale(); var loc = (saved === "auto") ? (navigator.language || "en-US") : saved; document.documentElement.lang = loc; document.documentElement.dir = isRTL(saved) ? "rtl" : (saved==="auto"?"auto":"ltr"); }

    function setMetaLabels(){ brandTitle.textContent = tStr("title"); themeLabel.textContent = tStr("theme"); langLabel.textContent = tStr("language"); updateFmtLabel(); copyBtn.textContent = "📋 " + tStr("copy"); fmtInput.setAttribute("aria-label", tStr("aria_toggle_fmt")); }

    function populateLanguages(){ langSelect.innerHTML = ""; for (var j=0;j<LANGS.length;j++){ var lo=document.createElement("option"); lo.value=LANGS[j].id; lo.textContent=LANGS[j].name; langSelect.appendChild(lo);} }

    function populateThemes(){
      var selected = themeSelect.value || storage.get("themeId","auto");
      themeSelect.innerHTML = "";
      var autoOpt = document.createElement("option"); autoOpt.value = "auto"; autoOpt.textContent = tThemeName("auto"); themeSelect.appendChild(autoOpt);
      for (var i=1;i<THEMES.length;i++){
        var t = THEMES[i]; var opt=document.createElement("option"); opt.value=t.id; opt.textContent = tThemeName(t.id); themeSelect.appendChild(opt);
      }
      themeSelect.value = selected;
    }

    function applyTheme(themeId){
      var mode = themeId;
      if (themeId === "auto") { mode = "auto"; themeId = systemDefaultThemeId(); }
      var t = themeById(themeId);
      root.style.setProperty("--fg", t.fg); root.style.setProperty("--muted", t.muted); root.style.setProperty("--accent", t.accent);
      root.style.setProperty("--bg-a", t.bg[0]); root.style.setProperty("--bg-b", t.bg[1]); root.style.setProperty("--bg-c", t.bg[2]);
      root.style.setProperty("--panel", t.panel[0]); root.style.setProperty("--panel-strong", t.panel[1]); root.style.setProperty("--panel-border", t.border);
      root.style.setProperty("--shadow", t.shadow); root.style.setProperty("--shadow2", t.shadow2); root.style.setProperty("--ring", "0 0 0 3px "+ t.ring);
      root.style.setProperty("--menu-bg", t.menuBg || (t.scheme === "dark" ? "#0b1220" : "#ffffff"));
      root.style.setProperty("--menu-fg", t.menuFg || t.fg);
      root.style.setProperty("--menu-border", t.menuBorder || t.border);
      root.setAttribute("data-scheme", t.scheme); try { root.style.colorScheme = t.scheme; } catch(e){}
      setMetaThemeColor(t.themeColor);
      themeModeEl.textContent = tStr("mode_" + ((mode === "auto") ? "auto" : "manual"));
    }

    function resolvedTimeZone(){ try { var opts = Intl.DateTimeFormat().resolvedOptions(); return opts && opts.timeZone ? opts.timeZone : "Local"; } catch(e){ return "Local"; } }
    function formatUtcOffset(minutesBehindUtc){ var total = -minutesBehindUtc; var sign = total >=0?"+":"-"; var abs=Math.abs(total); var hh=String(Math.floor(abs/60)).padStart(2,"0"); var mm=String(abs%60).padStart(2,"0"); return "UTC"+sign+hh+":"+mm; }

    var lastTzName = ""; var lastOffset = null; var timeFmt=null; var dateFmt=null; var use12h=false;

    function rebuildFormatters(){
      lastTzName = resolvedTimeZone(); lastOffset = new Date().getTimezoneOffset(); tzNameEl.textContent = lastTzName; utcOffsetEl.textContent = formatUtcOffset(lastOffset); tzLabel.textContent = lastTzName + " • " + formatUtcOffset(lastOffset);
      var loc = effectiveLocale();
      try{ timeFmt = new Intl.DateTimeFormat(loc,{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:use12h}); dateFmt = new Intl.DateTimeFormat(loc,{weekday:"long",year:"numeric",month:"long",day:"numeric"}); }catch(e){ timeFmt=null; dateFmt=null; }
    }

    function detectTzChange(){ var tz = resolvedTimeZone(); var off = new Date().getTimezoneOffset(); return (tz !== lastTzName) || (off !== lastOffset); }

    function fallbackTimeParts(now){ var pad2=function(n){return String(n).padStart(2,"0")}; var h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(); if(use12h){ var ampm = h>=12?"PM":"AM"; h=h%12; if(h===0) h=12; return {digits:pad2(h)+":"+pad2(m)+":"+pad2(s), ampm:ampm}; } return {digits:pad2(h)+":"+pad2(m)+":"+pad2(s), ampm:""}; }

    function render(force){
      if (force || detectTzChange()){ rebuildFormatters(); if(!force) showToast(tStr("toast_tz")); }
      var now = new Date(); var digits="", ampm="";
      if (timeFmt && timeFmt.formatToParts){ try{ var parts=timeFmt.formatToParts(now); for(var i=0;i<parts.length;i++){ if(parts[i].type==="dayPeriod") ampm+=parts[i].value; else digits+=parts[i].value; } digits=digits.trim(); ampm=ampm.trim(); }catch(e){ var fp=fallbackTimeParts(now); digits=fp.digits; ampm=fp.ampm; } }
      else if (timeFmt){ var fp2=fallbackTimeParts(now); digits=fp2.digits; ampm=fp2.ampm; }
      else { var fp3=fallbackTimeParts(now); digits=fp3.digits; ampm=fp3.ampm; }
      timeDigitsEl.textContent = digits; timeAmPmEl.textContent = use12h ? ampm : ""; timeAmPmEl.style.display = use12h?"inline":"none"; var dStr = (dateFmt?dateFmt.format(now):now.toDateString()); dateEl.textContent = dStr;
    }

    var timerId=null; function scheduleTick(){ render(false); var now=Date.now(); var delay=1000-(now%1000); timerId=setTimeout(scheduleTick, delay); }

    function updateFmtLabel(){ fmtLabel.innerHTML = "<strong>"+ (use12h ? tStr("hour12") : tStr("hour24")) + "</strong>"; fmtInput.checked=use12h; fmtToggle.dataset.on=String(use12h); fmtToggle.setAttribute("aria-checked", String(use12h)); }

    function init(){
      populateLanguages();
      var savedTheme = storage.get("themeId","auto");
      var savedLocale = storage.get("locale","auto");
      langSelect.value = savedLocale; themeSelect.value = savedTheme;
      use12h = (storage.get("fmt12h","false") === "true"); // left=false => 24‑hour; right=true => 12‑hour
      updateFmtLabel();

      applyLanguageAttrs(); setMetaLabels(); populateThemes(); themeSelect.value = savedTheme;
      measureTopbar();
      applyTheme(savedTheme); rebuildFormatters(); render(true); scheduleTick();

      themeSelect.addEventListener("change", function(){ storage.set("themeId", themeSelect.value); applyTheme(themeSelect.value); showToast(tStr("toast_theme")); });
      langSelect.addEventListener("change", function(){ storage.set("locale", langSelect.value || "auto"); applyLanguageAttrs(); setMetaLabels(); populateThemes(); themeSelect.value = storage.get("themeId","auto"); rebuildFormatters(); render(true); showToast(tStr("toast_theme")); });

      fmtToggle.addEventListener("click", function(){ use12h=!use12h; storage.set("fmt12h", String(use12h)); updateFmtLabel(); measureTopbar(); rebuildFormatters(); render(true); showToast(tStr("toast_fmt")); });
      fmtToggle.addEventListener("keydown", function(e){ if(e.key===" " || e.key==="Enter"){ e.preventDefault(); fmtToggle.click(); } });

      copyBtn.addEventListener("click", function(){ var txt=(timeDigitsEl.textContent||"").trim() + (use12h && timeAmPmEl.textContent?" "+timeAmPmEl.textContent.trim():""); if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){ showToast(tStr("toast_copy_ok")); }).catch(function(){ showToast(tStr("toast_copy_fail")); }); return;} try{ var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); ta.remove(); showToast(tStr("toast_copy_ok")); }catch(e){ showToast(tStr("toast_copy_fail")); } });

      if (prefersDark){ var handler=function(){ if (themeSelect.value==="auto") applyTheme("auto"); }; if (prefersDark.addEventListener) prefersDark.addEventListener("change", handler); else if (prefersDark.addListener) prefersDark.addListener(handler); }
      window.addEventListener('resize', function(){ measureTopbar(); }); document.addEventListener("visibilitychange", function(){ if(!document.hidden) render(true); }); window.addEventListener("focus", function(){ render(true); }); setInterval(function(){ render(false); }, 30000); window.addEventListener("pagehide", function(){ if (timerId) clearTimeout(timerId); });
    }

    var toastTimer=null; function showToast(msg){ toast.textContent = msg; toast.classList.add("show"); if(toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(function(){ toast.classList.remove("show"); }, 1200); }

    try { init(); } catch(err){ try { showToast("Error: "+(err&&err.message?err.message:String(err))); } catch(e){} setInterval(function(){ var now=new Date(); var fp=fallbackTimeParts(now); timeDigitsEl.textContent=fp.digits; timeAmPmEl.textContent=use12h?fp.ampm:""; timeAmPmEl.style.display=use12h?"inline":"none"; dateEl.textContent=now.toDateString(); }, 1000); }
  })();
